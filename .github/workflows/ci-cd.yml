name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Workflow validation ────────────────────────────────────────────────────
  shell:
    name: Workflow CI
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: false
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: false

  # ── TypeScript typecheck + build ───────────────────────────────────────────
  node:
    name: Node CI
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-node.yml@main
    with:
      node-version: '22'
      run-lint: false
      run-typecheck: true
      run-test: false
      run-build: true
      run-link-check: true
      link-check-paths: 'docs/**/*.md'

  # ── Security ───────────────────────────────────────────────────────────────
  security:
    name: Security
    if: github.event_name == 'pull_request'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read

  # ── GitHub Pages deploy ────────────────────────────────────────────────────
  pages:
    name: Pages
    needs: [shell, node]
    if: github.event_name != 'pull_request'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/deploy-pages.yml@main
    with:
      node-version: '22'
      build-command: bun run build
      output-directory: .vitepress/dist
