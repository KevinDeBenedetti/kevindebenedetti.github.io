services:
  vitepress:
    container_name: vitepress
    platform: linux/amd64
    restart: always
    # working_dir: /app
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./docs:/app/docs
      - /node_modules
    env_file:
      - .env
    ports:
      - 3001:5173
    # attach: true
