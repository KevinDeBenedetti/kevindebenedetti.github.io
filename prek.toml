# =============================================================================
# prek.toml — git hook configuration (https://prek.j178.dev)
# prek is installed as a dev dependency: @j178/prek
#
# Install hooks:  bun run prepare   (runs automatically after bun install)
# Run all:        prek run --all-files
# Run staged:     prek run
# Update revs:    prek autoupdate
# =============================================================================

minimum_prek_version = "0.3.0"
fail_fast = false
default_install_hook_types = ["pre-commit"]

# ─── General file hygiene ───────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
# renovate: datasource=github-tags depName=pre-commit/pre-commit-hooks
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

# ─── GitHub Actions workflow linting ────────────────────────────────────────
[[repos]]
repo = "https://github.com/rhysd/actionlint"
# renovate: datasource=github-tags depName=rhysd/actionlint
rev = "v1.7.10"
hooks = [
  { id = "actionlint" },
]

# ─── Local hooks ────────────────────────────────────────────────────────────
# oxlint is a dev dependency — prek uses the node language to manage its own
# Node.js runtime so the hook works regardless of the caller's $PATH (IDE, CI…)
[[repos]]
repo = "local"

[[repos.hooks]]
id = "oxlint"
name = "oxlint"
language = "node"
entry = "oxlint"
args = ["--tsconfig=tsconfig.json"]
additional_dependencies = ["oxlint"]
types_or = ["ts", "vue"]
pass_filenames = true

# ─── Docs link safety ────────────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/KevinDeBenedetti/github-workflows"
rev = "v0.3.0"
hooks = [
  { id = "check-docs-links" },
  { id = "check-vitepress-md" },
]
