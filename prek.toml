# =============================================================================
# prek.toml — git hook configuration (https://prek.j178.dev)
#
# Install prek:   brew install j178/tap/prek
# Install hooks:  prek install       (run once after cloning)
# Run all:        prek run --all-files    (or: bun run lint)
# Run staged:     prek run
# =============================================================================

minimum_prek_version = "0.3.0"
fail_fast = false
default_install_hook_types = ["pre-commit"]

# ─── General file hygiene ───────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

# ─── YAML linting ───────────────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/adrienverge/yamllint"
rev = "v1.37.0"
hooks = [
  { id = "yamllint", args = ["--config-file", ".yamllint.yaml"] },
]
